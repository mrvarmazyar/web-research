name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test
        run: go test ./...

      - name: Build CLI
        run: go build -o wr ./cmd/wr

      - name: Build MCP server
        run: go build -o wr-mcp ./cmd/wr-mcp
